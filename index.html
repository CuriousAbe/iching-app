<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f1a"/>
  <title>易经算卦</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{
      --bg:#070b14;--bg2:#0f172a;--card:#0f1629cc;--line:#2a3550;--text:#ecf2ff;--muted:#9fb0d1;
      --gold:#f5c56a;--jade:#3dd2b2;--danger:#ff7b7b;
    }
    *{box-sizing:border-box}
    body{margin:0;color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"PingFang SC",sans-serif;
      background:radial-gradient(1200px 800px at 20% -10%,#1b2944 0%,transparent 40%),
                 radial-gradient(1200px 800px at 120% 10%,#3b1f47 0%,transparent 35%),
                 linear-gradient(160deg,var(--bg),var(--bg2));}
    .wrap{max-width:980px;margin:0 auto;padding:18px}
    .hero{padding:18px;border:1px solid #3a4460;border-radius:18px;background:linear-gradient(160deg,#121b31cc,#0d1528cc);backdrop-filter:blur(8px);
      box-shadow:0 12px 40px #0007,inset 0 1px 0 #ffffff18;margin-bottom:14px}
    .title{display:flex;align-items:center;gap:10px;font-size:26px;font-weight:800;letter-spacing:.5px}
    .badge{font-size:12px;border:1px solid #735a2b;border-radius:999px;padding:3px 10px;color:var(--gold);background:#2a1f0f66}
    .muted{color:var(--muted);font-size:13px}

    .grid{display:grid;grid-template-columns:1.1fr .9fr;gap:12px}
    @media (max-width:860px){.grid{grid-template-columns:1fr}}

    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 8px 24px #0006}
    h2{margin:0 0 10px;font-size:17px;color:#dbe7ff}
    textarea{width:100%;min-height:90px;resize:vertical;background:#081022;border:1px solid #34425f;color:var(--text);border-radius:12px;padding:11px}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    button{border:1px solid #3b4b6c;background:#0d1730;color:var(--text);border-radius:12px;padding:9px 14px;cursor:pointer;font-weight:600}
    button.primary{border-color:#2fb79b;background:linear-gradient(180deg,#0f4b41,#0c3c34)}
    button.warn{border-color:#7f3f3f;background:#3e1d1d}
    button:hover{filter:brightness(1.08)}

    .hex{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width:640px){.hex{grid-template-columns:1fr}}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;border:1px solid #5a4a28;background:#221a0f66;color:var(--gold);font-size:12px;margin-bottom:8px}
    .yao{display:grid;gap:8px;margin-top:10px;padding-right:26px}
    .line{height:14px;position:relative;filter:drop-shadow(0 1px 0 #0008)}
    .solid,.brokenL,.brokenR{position:absolute;top:0;height:14px;background:linear-gradient(180deg,#f2f6ff,#d7e2ff);border-radius:999px}
    .solid{left:0;right:0}
    .brokenL{left:0;width:42%}
    .brokenR{right:0;width:42%}
    .changing::after{content:'动';position:absolute;right:-24px;top:-2px;font-size:12px;color:var(--jade);font-weight:700}

    .reading{line-height:1.7}
    .reading b{color:#fff}
    ul{margin:6px 0 0 18px;padding:0}
    li{margin:6px 0;color:#d7e3ff}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="title">☯ 易经算卦 <span class="badge">长期版 · 离线可用</span></div>
      <div class="muted" style="margin-top:6px">铜钱六爻起卦｜本地保存历史记录｜适合手机长期使用</div>
    </section>

    <section class="grid">
      <div class="card">
        <h2>所问之事</h2>
        <textarea id="question" placeholder="例如：近期是否适合推进新项目？"></textarea>
        <div class="row" style="margin-top:10px">
          <button id="genBtn" class="primary">一键起卦</button>
          <button id="clearBtn">清空问题</button>
          <button id="wipeHistory" class="warn">清空历史</button>
        </div>
        <div class="muted" style="margin-top:8px">算法：三枚铜钱法（6/7/8/9），自动生成本卦与变卦。</div>
      </div>

      <div class="card">
        <h2>解读建议</h2>
        <div id="reading" class="reading muted">起卦后显示。</div>
      </div>
    </section>

    <section class="card" style="margin-top:12px">
      <div class="hex">
        <div>
          <h2>本卦</h2>
          <div id="mainName" class="pill">-</div>
          <div id="mainMeta" class="muted"></div>
          <div id="mainYao" class="yao"></div>
        </div>
        <div>
          <h2>变卦</h2>
          <div id="chgName" class="pill">-</div>
          <div id="chgMeta" class="muted"></div>
          <div id="chgYao" class="yao"></div>
        </div>
      </div>
    </section>

    <section class="card" style="margin-top:12px">
      <h2>历史记录（本地）</h2>
      <ul id="history"></ul>
    </section>
  </div>

<script>
const TRIGRAMS = {
  '111': {name:'乾', nature:'天'}, '110': {name:'兑', nature:'泽'}, '101': {name:'离', nature:'火'}, '100': {name:'震', nature:'雷'},
  '011': {name:'巽', nature:'风'}, '010': {name:'坎', nature:'水'}, '001': {name:'艮', nature:'山'}, '000': {name:'坤', nature:'地'}
};
const HEXAGRAM_NAMES = {
'111111':'乾为天','000000':'坤为地','010001':'水雷屯','100010':'山水蒙','010111':'水天需','111010':'天水讼','000010':'地水师','010000':'水地比',
'110111':'风天小畜','111011':'天泽履','000111':'地天泰','111000':'天地否','111101':'天火同人','101111':'火天大有','000100':'地山谦','001000':'雷地豫',
'011001':'泽雷随','100110':'山风蛊','000011':'地泽临','110000':'风地观','101001':'火雷噬嗑','100101':'山火贲','100000':'山地剥','000001':'地雷复',
'111001':'天雷无妄','100111':'山天大畜','100001':'山雷颐','011110':'泽风大过','010010':'坎为水','101101':'离为火','011100':'泽山咸','001110':'雷风恒',
'111100':'天山遁','001111':'雷天大壮','101000':'火地晋','000101':'地火明夷','110101':'风火家人','101011':'火泽睽','010100':'水山蹇','001010':'雷水解',
'110001':'山泽损','100011':'风雷益','111110':'泽天夬','011111':'天风姤','110000':'泽地萃','000011':'地风升','010110':'泽水困','011010':'水风井',
'110100':'泽火革','001011':'火风鼎','100100':'震为雷','001001':'艮为山','011011':'风山渐','110110':'雷泽归妹','101100':'雷火丰','001101':'火山旅',
'011011':'巽为风','010010':'兑为泽','011010':'风水涣','010110':'水泽节','110011':'风泽中孚','001100':'雷山小过','101010':'水火既济','010101':'火水未济'
};
const KEYWORDS={
'乾为天':'刚健进取，先难后易。','坤为地':'厚德承载，以柔克刚。','火地晋':'明出地上，宜主动争取。','地火明夷':'外晦内明，守正待时。','火水未济':'事未成，宜谨慎推进。','水火既济':'阶段既成，防盛极转衰。'
};

function tossThreeCoins(){const c=()=>Math.random()<0.5?2:3;return c()+c()+c();}
function buildHex(){const lines=[];for(let i=0;i<6;i++){const s=tossThreeCoins();if(s===6)lines.push({yang:0,changing:true});if(s===7)lines.push({yang:1,changing:false});if(s===8)lines.push({yang:0,changing:false});if(s===9)lines.push({yang:1,changing:true});}return lines;}
const toBits=lines=>lines.map(l=>l.yang?1:0).join('');
const changed=lines=>lines.map(l=>l.changing?{...l,yang:l.yang?0:1,changing:false}:l);
function trigramMeta(bits6){const lower=bits6.slice(0,3),upper=bits6.slice(3,6);const l=TRIGRAMS[lower],u=TRIGRAMS[upper];return `上卦 ${u.name}(${u.nature}) · 下卦 ${l.name}(${l.nature})`;}
function renderYao(el,lines){el.innerHTML='';[...lines].reverse().forEach(l=>{const d=document.createElement('div');d.className='line'+(l.changing?' changing':'');if(l.yang){const s=document.createElement('div');s.className='solid';d.appendChild(s);}else{const a=document.createElement('div');a.className='brokenL';const b=document.createElement('div');b.className='brokenR';d.append(a,b);}el.appendChild(d);});}
function now(){const d=new Date();const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}
function saveHistory(item){const list=JSON.parse(localStorage.getItem('iching_history')||'[]');list.unshift(item);localStorage.setItem('iching_history',JSON.stringify(list.slice(0,200)));renderHistory();}
function renderHistory(){const ul=document.getElementById('history');const list=JSON.parse(localStorage.getItem('iching_history')||'[]');ul.innerHTML='';if(!list.length){ul.innerHTML='<li class="muted">暂无记录</li>';return;}list.slice(0,40).forEach(x=>{const li=document.createElement('li');li.textContent=`[${x.time}] ${x.q||'（未填写问题）'} ｜ ${x.main} → ${x.chg}`;ul.appendChild(li);});}
function doDivination(){const q=document.getElementById('question').value.trim();const mainLines=buildHex(),chgLines=changed(mainLines);const mBits=toBits(mainLines),cBits=toBits(chgLines);const mName=HEXAGRAM_NAMES[mBits]||`卦象(${mBits})`;const cName=HEXAGRAM_NAMES[cBits]||`卦象(${cBits})`;
  document.getElementById('mainName').textContent=mName;document.getElementById('chgName').textContent=cName;
  document.getElementById('mainMeta').textContent=trigramMeta(mBits);document.getElementById('chgMeta').textContent=trigramMeta(cBits);
  renderYao(document.getElementById('mainYao'),mainLines);renderYao(document.getElementById('chgYao'),chgLines);
  const k1=KEYWORDS[mName]||'先观势，再定节奏。';const k2=KEYWORDS[cName]||'变卦提示后续走向与调整方向。';const changing=mainLines.filter(x=>x.changing).length;
  document.getElementById('reading').innerHTML=`<div>本卦：<b>${mName}</b>。${k1}</div><div style='margin-top:6px'>变卦：<b>${cName}</b>。${k2}</div><div style='margin-top:6px'>动爻数：<b>${changing}</b>。建议：${changing<=1?'稳中求进，抓一个关键点。':changing<=3?'边做边校准，避免一次性重注。':'变化偏大，先保底再扩张。'}</div><div class='muted' style='margin-top:8px'>提示：算卦用于启发决策，不替代现实信息与专业判断。</div>`;
  saveHistory({time:now(),q,main:mName,chg:cName});
}

document.getElementById('genBtn').addEventListener('click',doDivination);
document.getElementById('clearBtn').addEventListener('click',()=>document.getElementById('question').value='');
document.getElementById('wipeHistory').addEventListener('click',()=>{if(confirm('确定清空本地历史记录？')){localStorage.removeItem('iching_history');renderHistory();}});
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}renderHistory();
</script>
</body>
</html>
