<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0812" />
  <title>易经算卦 · 仪式版</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{
      --bg:#0b0812;--bg2:#171022;--card:#140f1fcc;--line:#3a2e52;--text:#f7f1e8;--muted:#b9abc9;
      --gold:#e5be78;--jade:#7de5c3;--rose:#d7a6ff;
    }
    *{box-sizing:border-box}
    body{margin:0;color:var(--text);font-family:"Noto Serif SC","Songti SC",Georgia,serif;
      background:radial-gradient(900px 600px at 50% -10%,#2e1b4a55,transparent 50%),
      radial-gradient(1200px 700px at 10% 120%,#1c3b4d44,transparent 45%),
      linear-gradient(160deg,var(--bg),var(--bg2));min-height:100svh}
    .wrap{max-width:980px;margin:0 auto;padding:18px}
    .hero,.card{border:1px solid var(--line);border-radius:16px;background:var(--card);backdrop-filter:blur(6px);box-shadow:0 10px 34px #0008,inset 0 1px 0 #ffffff14}
    .hero{padding:18px;margin-bottom:12px;position:relative;overflow:hidden}
    .hero:before{content:"";position:absolute;inset:-80% -20% auto;height:200px;background:radial-gradient(circle,#ffdca244,transparent 60%);animation:float 7s ease-in-out infinite}
    @keyframes float{50%{transform:translateY(16px)}}
    .title{font-size:28px;font-weight:700;letter-spacing:.08em;display:flex;align-items:center;gap:10px}
    .seal{font-size:12px;padding:3px 10px;border:1px solid #6c5430;border-radius:999px;color:var(--gold);background:#3a2d1850}
    .muted{color:var(--muted);font-size:13px;line-height:1.6}
    .grid{display:grid;grid-template-columns:1.1fr .9fr;gap:12px}
    @media (max-width:860px){.grid{grid-template-columns:1fr}}
    .card{padding:14px}
    h2{margin:0 0 9px;font-size:18px;color:#f3e8d5}
    textarea{width:100%;min-height:92px;background:#0b0a14;border:1px solid #46395d;color:var(--text);border-radius:12px;padding:11px;font-family:inherit}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    button{border:1px solid #4e4166;background:#17122a;color:var(--text);border-radius:11px;padding:9px 14px;cursor:pointer;font-family:inherit}
    button.primary{border-color:#7c5f33;background:linear-gradient(180deg,#4b3819,#2d2110);color:#f7e6c6}
    button.warn{border-color:#6d3c4f;background:#2c1420}
    button:disabled{opacity:.5;cursor:not-allowed}
    .ritual{margin-top:9px;padding:10px 12px;border:1px dashed #594572;border-radius:10px;background:#1a1328a6}
    .coinRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .coin{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;border:1px solid #8c6f3d;background:radial-gradient(circle at 30% 30%,#f7deab,#af7f2f);color:#452f0d;font-size:12px}

    .hexWrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
    @media (max-width:680px){.hexWrap{grid-template-columns:1fr}}
    .pill{display:inline-flex;padding:5px 10px;border:1px solid #70552c;border-radius:999px;color:var(--gold);background:#2c211150;font-size:12px;margin-bottom:7px}
    .yao{display:grid;gap:8px;margin-top:10px;padding-right:24px}
    .line{height:14px;position:relative}
    .solid,.brokenL,.brokenR{position:absolute;top:0;height:14px;border-radius:999px;background:linear-gradient(180deg,#fff4e2,#edd7b5)}
    .solid{left:0;right:0}.brokenL{left:0;width:42%}.brokenR{right:0;width:42%}
    .changing::after{content:'动';position:absolute;right:-22px;top:-1px;color:var(--jade);font-size:12px;font-weight:700}

    .reading{line-height:1.8}
    .reading b{color:#fff}
    ul{margin:8px 0 0 18px;padding:0}
    li{margin:6px 0}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="title">☯ 易经算卦 <span class="seal">仪式感版本</span></div>
      <div class="muted" style="margin-top:6px">静心 · 立问 · 起卦 · 观变。可离线使用，历史自动保存。</div>
    </section>

    <section class="grid">
      <div class="card">
        <h2>立问</h2>
        <textarea id="question" placeholder="请写下你真正想问的一个问题…"></textarea>
        <div class="ritual">
          <div class="muted">先深呼吸一次，再点击「起卦」。系统将模拟六次铜钱掷卦。</div>
          <div class="row" style="margin-top:8px">
            <button id="genBtn" class="primary">开始起卦</button>
            <button id="clearBtn">清空</button>
            <button id="wipeHistory" class="warn">清空历史</button>
          </div>
          <div id="ritualText" class="muted" style="margin-top:8px">尚未起卦</div>
          <div id="coinRow" class="coinRow"></div>
        </div>
      </div>

      <div class="card">
        <h2>解读</h2>
        <div id="reading" class="reading muted">起卦后显示。</div>
      </div>
    </section>

    <section class="card" style="margin-top:12px">
      <div class="hexWrap">
        <div>
          <h2>本卦</h2>
          <div id="mainName" class="pill">-</div>
          <div id="mainMeta" class="muted"></div>
          <div id="mainYao" class="yao"></div>
        </div>
        <div>
          <h2>变卦</h2>
          <div id="chgName" class="pill">-</div>
          <div id="chgMeta" class="muted"></div>
          <div id="chgYao" class="yao"></div>
        </div>
      </div>
    </section>

    <section class="card" style="margin-top:12px">
      <h2>历史记录</h2>
      <ul id="history"></ul>
    </section>
  </div>

<script>
const TRIGRAMS={'111':{name:'乾',nature:'天'},'110':{name:'兑',nature:'泽'},'101':{name:'离',nature:'火'},'100':{name:'震',nature:'雷'},'011':{name:'巽',nature:'风'},'010':{name:'坎',nature:'水'},'001':{name:'艮',nature:'山'},'000':{name:'坤',nature:'地'}};
const HEXAGRAM_NAMES={'111111':'乾为天','000000':'坤为地','010001':'水雷屯','100010':'山水蒙','010111':'水天需','111010':'天水讼','000010':'地水师','010000':'水地比','110111':'风天小畜','111011':'天泽履','000111':'地天泰','111000':'天地否','111101':'天火同人','101111':'火天大有','000100':'地山谦','001000':'雷地豫','011001':'泽雷随','100110':'山风蛊','000011':'地泽临','110000':'风地观','101001':'火雷噬嗑','100101':'山火贲','100000':'山地剥','000001':'地雷复','111001':'天雷无妄','100111':'山天大畜','100001':'山雷颐','011110':'泽风大过','010010':'坎为水','101101':'离为火','011100':'泽山咸','001110':'雷风恒','111100':'天山遁','001111':'雷天大壮','101000':'火地晋','000101':'地火明夷','110101':'风火家人','101011':'火泽睽','010100':'水山蹇','001010':'雷水解','110001':'山泽损','100011':'风雷益','111110':'泽天夬','011111':'天风姤','110000':'泽地萃','000011':'地风升','010110':'泽水困','011010':'水风井','110100':'泽火革','001011':'火风鼎','100100':'震为雷','001001':'艮为山','011011':'风山渐','110110':'雷泽归妹','101100':'雷火丰','001101':'火山旅','011011':'巽为风','010010':'兑为泽','011010':'风水涣','010110':'水泽节','110011':'风泽中孚','001100':'雷山小过','101010':'水火既济','010101':'火水未济'};
const KEYWORDS={'乾为天':'宜果决，先立原则再行动。','坤为地':'宜包容，先承接再推进。','火地晋':'可主动争取，贵在正大光明。','地火明夷':'先守心志，暂避锋芒。','火水未济':'时机未满，先做准备。','水火既济':'局部已成，谨防松懈。'};

const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const coinRow=document.getElementById('coinRow');
const ritualText=document.getElementById('ritualText');

function tossThreeCoins(){const c=()=>Math.random()<0.5?2:3;return [c(),c(),c()];}
function scoreToLine(sum){if(sum===6)return {yang:0,changing:true};if(sum===7)return {yang:1,changing:false};if(sum===8)return {yang:0,changing:false};return {yang:1,changing:true};}
const toBits=lines=>lines.map(l=>l.yang?1:0).join('');
const changed=lines=>lines.map(l=>l.changing?{...l,yang:l.yang?0:1,changing:false}:l);
function trigramMeta(bits6){const lower=bits6.slice(0,3),upper=bits6.slice(3,6);const l=TRIGRAMS[lower],u=TRIGRAMS[upper];return `上卦 ${u.name}(${u.nature}) · 下卦 ${l.name}(${l.nature})`;}
function renderYao(el,lines){el.innerHTML='';[...lines].reverse().forEach(l=>{const d=document.createElement('div');d.className='line'+(l.changing?' changing':'');if(l.yang){const s=document.createElement('div');s.className='solid';d.appendChild(s)}else{const a=document.createElement('div');a.className='brokenL';const b=document.createElement('div');b.className='brokenR';d.append(a,b)}el.appendChild(d);});}
function now(){const d=new Date();const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}
function saveHistory(item){const list=JSON.parse(localStorage.getItem('iching_history')||'[]');list.unshift(item);localStorage.setItem('iching_history',JSON.stringify(list.slice(0,200)));renderHistory();}
function renderHistory(){const ul=document.getElementById('history');const list=JSON.parse(localStorage.getItem('iching_history')||'[]');ul.innerHTML='';if(!list.length){ul.innerHTML='<li class="muted">暂无记录</li>';return;}list.slice(0,40).forEach(x=>{const li=document.createElement('li');li.textContent=`[${x.time}] ${x.q||'（未填写问题）'} ｜ ${x.main} → ${x.chg}`;ul.appendChild(li);});}

async function doDivination(){
  const btn=document.getElementById('genBtn'); btn.disabled=true;
  const q=document.getElementById('question').value.trim();
  const lines=[]; coinRow.innerHTML=''; ritualText.textContent='焚香静心中…';
  await sleep(450);
  for(let i=0;i<6;i++){
    ritualText.textContent=`第 ${i+1} 爻：掷铜钱…`;
    await sleep(280);
    const coins=tossThreeCoins(); const sum=coins[0]+coins[1]+coins[2];
    coins.forEach(v=>{const c=document.createElement('div');c.className='coin';c.textContent=v===3?'阳':'阴';coinRow.appendChild(c);});
    lines.push(scoreToLine(sum));
    await sleep(220);
  }
  ritualText.textContent='卦成，观其象。';

  const mBits=toBits(lines), cBits=toBits(changed(lines));
  const mName=HEXAGRAM_NAMES[mBits]||`卦象(${mBits})`; const cName=HEXAGRAM_NAMES[cBits]||`卦象(${cBits})`;
  document.getElementById('mainName').textContent=mName; document.getElementById('chgName').textContent=cName;
  document.getElementById('mainMeta').textContent=trigramMeta(mBits); document.getElementById('chgMeta').textContent=trigramMeta(cBits);
  renderYao(document.getElementById('mainYao'),lines); renderYao(document.getElementById('chgYao'),changed(lines));

  const k1=KEYWORDS[mName]||'先辨主次，再定步骤。';
  const k2=KEYWORDS[cName]||'变卦提示后势，贵在因时调整。';
  const changing=lines.filter(x=>x.changing).length;
  document.getElementById('reading').innerHTML=`<div>本卦：<b>${mName}</b>。${k1}</div><div style='margin-top:6px'>变卦：<b>${cName}</b>。${k2}</div><div style='margin-top:6px'>动爻数：<b>${changing}</b>。${changing<=1?'当前主线清晰，稳步推进即可。':changing<=3?'局势有变，建议分阶段验证。':'变化较大，先求稳后求快。'}</div><div class='muted' style='margin-top:8px'>提示：此应用用于启发思考，不替代专业决策。</div>`;
  saveHistory({time:now(),q,main:mName,chg:cName});
  btn.disabled=false;
}

document.getElementById('genBtn').addEventListener('click',doDivination);
document.getElementById('clearBtn').addEventListener('click',()=>document.getElementById('question').value='');
document.getElementById('wipeHistory').addEventListener('click',()=>{if(confirm('确定清空本地历史记录？')){localStorage.removeItem('iching_history');renderHistory();}});
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}renderHistory();
</script>
</body>
</html>
